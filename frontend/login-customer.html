<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AM SPORT — تسجيل دخول العملاء">
  <meta name="theme-color" content="#080808">
  <title>AM SPORT | Customer Login</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,200;0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=Alexandria:wght@200;300;400;500&family=Rubik+Dirt&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/main.css">
  <style>
    body {
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    #toast-container {
      position: fixed;
      top: 2rem;
      left: 2rem;
      z-index: 10000;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .auth-container {
      width: 100%;
      max-width: 420px;
    }

    .auth-card {
      background: #111;
      border: 1px solid #222;
      border-radius: 16px;
      padding: 2.5rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
    }

    .auth-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .auth-logo {
      font-family: 'Rubik Dirt', 'Bebas Neue', sans-serif;
      font-size: 2.5rem;
      font-weight: 900;
      letter-spacing: 0.05em;
      color: #fff;
      margin-bottom: 1rem;
    }

    .auth-logo em {
      color: #c9a96e;
      font-style: normal;
    }

    .auth-subtitle {
      color: #999;
      font-size: 0.95rem;
      margin-bottom: 0.5rem;
    }

    .auth-toggle {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      border-bottom: 1px solid #222;
      padding-bottom: 1rem;
    }

    .auth-toggle-btn {
      flex: 1;
      padding: 0.75rem 1rem;
      background: transparent;
      border: none;
      color: #666;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.25s ease;
    }

    .auth-toggle-btn.active {
      color: #c9a96e;
      border-bottom-color: #c9a96e;
    }

    .auth-form {
      display: none;
    }

    .auth-form.active {
      display: block;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-label {
      display: block;
      margin-bottom: 0.5rem;
      color: #ddd;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .form-input {
      width: 100%;
      padding: 0.875rem 1rem;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      font-size: 0.95rem;
      transition: all 0.25s ease;
      font-family: 'Alexandria', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .form-input:focus {
      outline: none;
      border-color: #c9a96e;
      background: #222;
      box-shadow: 0 0 0 3px rgba(201, 169, 110, 0.1);
    }

    .form-input::placeholder {
      color: #666;
    }

    .form-submit {
      width: 100%;
      padding: 1rem;
      background: #c9a96e;
      border: none;
      border-radius: 8px;
      color: #000;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.25s ease;
      text-transform: uppercase;
    }

    .form-submit:hover {
      background: #dab890;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(201, 169, 110, 0.3);
    }

    .form-submit:active {
      transform: translateY(0);
    }

    .form-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .form-divider {
      text-align: center;
      margin: 1.5rem 0;
      color: #666;
      font-size: 0.85rem;
    }

    .form-link {
      text-align: center;
      margin-top: 1.25rem;
      color: #999;
      font-size: 0.9rem;
    }

    .form-link a {
      color: #c9a96e;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.25s ease;
    }

    .form-link a:hover {
      color: #dab890;
    }

    .password-toggle {
      position: relative;
    }

    .password-toggle-btn {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #999;
      cursor: pointer;
      padding: 0.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .password-toggle-btn:hover {
      color: #c9a96e;
    }

    .form-input.has-toggle {
      padding-left: 3rem;
    }

    .toast {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem 1.25rem;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #ddd;
      font-size: 0.95rem;
      font-weight: 500;
      animation: slideIn 0.3s ease forwards;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
    }

    .toast.success {
      border-color: rgba(34, 197, 94, 0.3);
      background: rgba(34, 197, 94, 0.05);
      color: #22c55e;
    }

    .toast.error {
      border-color: rgba(239, 68, 68, 0.3);
      background: rgba(239, 68, 68, 0.05);
      color: #ef4444;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @media (max-width: 480px) {
      .auth-card {
        padding: 2rem 1.5rem;
      }

      .auth-logo {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>
  <div id="toast-container"></div>

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">AM <em>SPORT</em></div>
        <p class="auth-subtitle">منصة التسوق الفاخرة للمرأة</p>
      </div>

      <!-- Toggle Tabs -->
      <div class="auth-toggle">
        <button class="auth-toggle-btn active" id="toggleLogin">تسجيل دخول</button>
        <button class="auth-toggle-btn" id="toggleRegister">تسجيل جديد</button>
      </div>

      <!-- Login Form -->
      <form id="customerLoginForm" class="auth-form active">
        <div class="form-group">
          <label class="form-label">البريد الإلكتروني</label>
          <input
            type="email"
            id="loginEmail"
            class="form-input"
            placeholder="أدخل بريدك الإلكتروني"
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label">كلمة المرور</label>
          <div class="password-toggle">
            <input
              type="password"
              id="loginPassword"
              class="form-input has-toggle"
              placeholder="أدخل كلمة المرور"
              required
            >
            <button type="button" class="password-toggle-btn" onclick="togglePassword('loginPassword')">
              <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="form-submit">تسجيل الدخول</button>

        <div class="form-link">
          ليس لديك حساب؟ <a href="#" onclick="switchForm('register')">سجلي الآن</a>
        </div>
      </form>

      <!-- Register Form -->
      <form id="customerRegisterForm" class="auth-form">
        <div class="form-group">
          <label class="form-label">الاسم الكامل</label>
          <input
            type="text"
            id="registerName"
            class="form-input"
            placeholder="أدخل اسمك الكامل"
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label">البريد الإلكتروني</label>
          <input
            type="email"
            id="registerEmail"
            class="form-input"
            placeholder="أدخل بريدك الإلكتروني"
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label">رقم الهاتف</label>
          <input
            type="tel"
            id="registerPhone"
            class="form-input"
            placeholder="أدخل رقم هاتفك"
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label">كلمة المرور</label>
          <div class="password-toggle">
            <input
              type="password"
              id="registerPassword"
              class="form-input has-toggle"
              placeholder="اختر كلمة مرور قوية"
              required
            >
            <button type="button" class="password-toggle-btn" onclick="togglePassword('registerPassword')">
              <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">تأكيد كلمة المرور</label>
          <div class="password-toggle">
            <input
              type="password"
              id="registerConfirmPassword"
              class="form-input has-toggle"
              placeholder="أعد إدخال كلمة المرور"
              required
            >
            <button type="button" class="password-toggle-btn" onclick="togglePassword('registerConfirmPassword')">
              <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="form-submit">إنشاء حساب</button>

        <div class="form-link">
          لديك حساب بالفعل؟ <a href="#" onclick="switchForm('login')">سجلي دخول</a>
        </div>
      </form>
    </div>
  </div>

  <script>
    function switchForm(form) {
      event.preventDefault();
      document.getElementById('customerLoginForm').classList.remove('active');
      document.getElementById('customerRegisterForm').classList.remove('active');
      document.querySelector(`#customer${form.charAt(0).toUpperCase() + form.slice(1)}Form`).classList.add('active');

      document.getElementById('toggleLogin').classList.remove('active');
      document.getElementById('toggleRegister').classList.remove('active');
      if (form === 'login') {
        document.getElementById('toggleLogin').classList.add('active');
      } else {
        document.getElementById('toggleRegister').classList.add('active');
      }
    }

    document.getElementById('toggleLogin').addEventListener('click', (e) => {
      e.preventDefault();
      switchForm('login');
    });

    document.getElementById('toggleRegister').addEventListener('click', (e) => {
      e.preventDefault();
      switchForm('register');
    });

    function togglePassword(fieldId) {
      const field = document.getElementById(fieldId);
      if (field.type === 'password') {
        field.type = 'text';
      } else {
        field.type = 'password';
      }
    }
  </script>

  <script src="js/auth-customer.js"></script>
</body>
</html>
